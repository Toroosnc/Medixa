<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - MEDIXA</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="auth-page">

    <div class="login-container">
        <div class="logo-box">
            <i data-lucide="shield-plus" style="color: #1e90ff;"></i>
        </div>
        <h2>Daftar Akun</h2>
        <p class="subtitle">Bergabung dengan MEDIXA</p>

        <div class="card">
            <form>
                <label>Daftar Sebagai</label>
                <div class="role-selector">
                    <button type="button" class="btn-role active">Pengguna</button>
                    <button type="button" class="btn-role">Donatur</button>
                </div>

                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <div class="input-wrapper">
                        <i data-lucide="user"></i>
                        <input type="text" placeholder="Nama lengkap Anda">
                    </div>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <div class="input-wrapper">
                        <i data-lucide="mail"></i>
                        <input type="email" placeholder="nama@email.com">
                    </div>
                </div>

                <div class="form-group">
                    <label>Nomor Telepon</label>
                    <div class="input-wrapper">
                        <i data-lucide="phone"></i>
                        <input type="text" placeholder="08xxxxxxxxxx">
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i data-lucide="lock"></i>
                        <input type="password" placeholder="Minimal 8 karakter">
                        <i data-lucide="eye" style="left: auto; right: 12px; cursor: pointer;"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label>Konfirmasi Password</label>
                    <div class="input-wrapper">
                        <i data-lucide="lock"></i>
                        <input type="password" placeholder="Ulangi password">
                    </div>
                </div>

                <button type="submit" class="btn-primary">Daftar</button>
            </form>

            <div class="footer-text">
                Sudah punya akun? <a href="index.html">Masuk di sini</a>
            </div>
        </div>

        <a href="#" class="back-home">← Kembali ke Beranda</a>
    </div>

    <script>
        lucide.createIcons();

        const roleBtns = document.querySelectorAll('.btn-role');
        roleBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                roleBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });
    </script>
</body>
</html>
