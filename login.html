<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MEDIXA</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="auth-page">

    <div class="login-container">
        <div class="logo-box">
            <i data-lucide="shield-plus" style="color: #1e90ff;"></i>
        </div>
        <h2>Selamat Datang</h2>
        <p class="subtitle">Masuk ke akun MEDIXA Anda</p>

        <div class="card">
            <form>
                <div class="form-group">
                    <label>Email</label>
                    <div class="input-wrapper">
                        <i data-lucide="mail"></i>
                        <input type="email" placeholder="nama@email.com">
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i data-lucide="lock"></i>
                        <input type="password" placeholder="Masukkan password">
                        <i data-lucide="eye" class="toggle-password"></i>
                    </div>
                </div>

                <div class="form-options">
                    <label style="display: flex; align-items: center; gap: 5px; margin: 0;">
                        <input type="checkbox"> Ingat saya
                    </label>
                    <a href="#">Lupa password?</a>
                </div>

                <button type="submit" class="btn-primary">Masuk</button>
            </form>

            <div class="divider">atau</div>

            <button class="btn-social">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
                Lanjutkan dengan Google
            </button>

            <div class="footer-text">
                Belum punya akun? <a href="register.html">Daftar sekarang</a>
            </div>
        </div>

        <a href="#" class="back-home">← Kembali ke Beranda</a>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
